<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Color & ArUco Counter</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/cv.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/gh/jcmellado/js-aruco/src/aruco.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --success: #22c55e;
            --warning: #facc15;
            --border: rgba(56, 189, 248, 0.3);
            --gold: #fbbf24;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0; background: var(--bg); color: var(--text-main);
            font-family: 'Inter', system-ui, sans-serif;
            overflow: hidden; height: 100vh; display: flex; flex-direction: column;
            -webkit-user-select: none; user-select: none;
        }
        
        input, select { -webkit-user-select: auto; user-select: auto; }

        header {
            padding: 12px 20px; background: rgba(15, 23, 42, 0.85);
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); backdrop-filter: blur(12px);
            flex-wrap: wrap; gap: 10px; z-index: 100;
        }

        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); font-size: 1.2rem; }

        .toolbar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .tool-item { 
            display: flex; align-items: center; gap: 6px; 
            background: rgba(0,0,0,0.4); padding: 6px 12px; 
            border-radius: 8px; border: 1px solid var(--border); font-size: 0.8rem; 
        }
        
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background-color: #475569; transition: .3s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(16px); }

        .container {
            display: grid; grid-template-columns: 280px 1fr 240px; grid-template-rows: 1fr auto;
            gap: 15px; padding: 15px; flex: 1; min-height: 0;
        }

        .sidebar { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--card); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 15px; backdrop-filter: blur(10px); }

        #camera-wrapper { position: relative; width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 10px; overflow: hidden; border: 2px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); cursor: crosshair; }
        
        .camera-switch-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: rgba(0,0,0,0.6); color: white; border: 1px solid var(--border);
            border-radius: 50%; width: 38px; height: 38px; font-size: 1.2rem;
            cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center;
            transition: 0.2s;
        }
        .camera-switch-btn:hover { background: var(--accent); color: black; }

        #timer-display { font-family: 'Courier New', monospace; font-size: 3.2rem; font-weight: bold; text-align: center; margin-bottom: 10px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .main-display { display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        #detect-msg { font-size: 1.8rem; font-weight: 900; color: var(--success); height: 2.2rem; text-align: center; letter-spacing: 2px; text-shadow: 0 0 10px rgba(34, 197, 94, 0.4); }

        #view-container { flex: 1; display: flex; flex-direction: column; min-height: 0; }
        #multi-view { display: flex; flex-direction: column; justify-content: space-around; flex: 1; overflow-y: auto; padding: 2px 8px; gap: 8px; }
        #multi-view::-webkit-scrollbar { width: 4px; }
        #multi-view::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .lane { display: none; flex-direction: column; gap: 6px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; }
        .lane.active { display: flex; }
        .lane-label { display: flex; justify-content: space-between; align-items: center; font-size: 0.95rem; font-weight: bold; transition: 0.2s; }
        .holding { text-shadow: 0 0 12px rgba(255, 255, 255, 0.9); transform: scale(1.02); }
        
        .manual-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; border-radius: 6px; width: 26px; height: 26px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: bold; font-size: 1rem; transition: 0.1s;
        }
        .manual-btn:hover { background: rgba(255,255,255,0.25); }
        .manual-btn:active { transform: scale(0.9); }

        .bar-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.3s ease; box-shadow: 0 0 10px currentColor; }

        #shared-view { display: none; align-items: center; justify-content: center; flex: 1; }
        .unified-meter {
            width: 100%; height: 100px; background: rgba(0,0,0,0.5); border-radius: 15px;
            border: 2px solid var(--border); overflow: hidden; display: flex; box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }
        .meter-segment {
            height: 100%; transition: flex 0.8s ease; display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; font-weight: bold; color: white; border-right: 1px solid rgba(255,255,255,0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .ranking-card { display: flex; flex-direction: column; gap: 10px; }
        .ranking-tabs { display: flex; align-items: center; gap: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; margin-bottom: 5px; }
        .tab-btn { font-size: 0.85rem; font-weight: bold; cursor: pointer; color: var(--text-muted); transition: 0.2s; letter-spacing: 1px; }
        .tab-btn.active { color: var(--gold); text-shadow: 0 0 8px rgba(255, 215, 0, 0.4); }
        
        .export-btn {
            background: rgba(34, 197, 94, 0.15); border: 1px solid rgba(34, 197, 94, 0.4);
            color: #4ade80; border-radius: 6px; width: 30px; height: 30px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; margin-left: auto; transition: 0.2s; padding: 0;
        }
        .export-btn:hover { background: #22c55e; color: white; }

        #ranking-list, #log-list { display: flex; flex-direction: column; gap: 8px; flex: 1; overflow-y: auto; max-height: 220px; padding-right: 5px; }
        #log-list { display: none; font-size: 0.85rem; }
        #ranking-list::-webkit-scrollbar, #log-list::-webkit-scrollbar { width: 4px; }
        #ranking-list::-webkit-scrollbar-thumb, #log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        
        .rank-item { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; font-size: 0.95rem; }
        .rank-num { font-weight: 900; color: var(--gold); width: 25px; }
        .log-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.2); padding: 8px 10px; border-radius: 6px; font-family: monospace; border-left: 4px solid; }

        .settings-grid { grid-column: 1 / -1; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; }
        .set-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 10px; font-size: 0.75rem; border-top: 4px solid transparent; display: flex; flex-direction: column; gap: 6px; }
        .set-item.disabled { opacity: 0.3; filter: grayscale(1); }
        
        .input-group { display: flex; align-items: center; justify-content: space-between; }
        .set-item input[type="text"], .set-item input[type="number"], .set-item select { 
            background: #1e293b; border: 1px solid #334155; color: #fff; border-radius: 4px; padding: 4px 6px; font-size: 0.8rem; width: 60px; text-align: center; 
        }
        .set-item input[type="text"] { width: 80px; text-align: left; }
        .set-item select { width: auto; text-align: left; }
        .set-item input[type="range"] { width: 100%; margin: 2px 0; accent-color: var(--accent); }
        
        .activity-bg { width: 100%; height: 6px; background: #0f172a; border-radius: 3px; margin-top: 4px; overflow: hidden; border: 1px solid #334155; }
        .activity-fill { height: 100%; width: 0%; background: var(--accent); transition: width 0.1s linear; }

        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-main { background: var(--accent); color: #000; width: 100%; padding: 14px; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-reset { background: #ef4444; color: white; font-size: 0.75rem; padding: 6px 12px; }

        .goal-flash { animation: goal 0.5s infinite alternate; }
        @keyframes goal { from { filter: brightness(1); } to { filter: brightness(1.5) drop-shadow(0 0 15px rgba(255,255,255,0.8)); } }

        #start-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        #area-settings { display: none; width: 100%; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px; margin-top: 10px; gap: 10px; flex-wrap: wrap; border: 1px solid var(--border); }
        .area-control { display: flex; flex-direction: column; width: 45%; font-size: 0.75rem; }
    </style>
</head>
<body>

<div id="start-overlay">
    <div class="logo" style="font-size: 3.5rem; margin-bottom: 2rem;">COLOR & ARUCO</div>
    <button class="btn btn-main" onclick="begin()" style="width: auto; padding: 20px 80px; font-size: 1.5rem;">INITIALIZE SYSTEM</button>
</div>

<header>
    <div class="logo">LAP COUNTER</div>
    <div class="toolbar">
        <div class="tool-item">
            Mode:
            <select id="mode-select" onchange="toggleMode(); sync();" style="background:transparent; color:var(--accent); border:none; outline:none; font-weight:bold;">
                <option value="normal">Normal</option>
                <option value="time">Time Attack</option>
            </select>
            <span id="time-limit-wrapper" style="display:none;">
                <input type="number" id="time-limit-val" value="60" step="1" min="1" onchange="updateTimerInitialDisplay(); sync();" style="width:40px; background:rgba(0,0,0,0.3); color:white; border:1px solid var(--border); border-radius:4px; text-align:center;">s
            </span>
        </div>
        <div class="tool-item">
            Audio:
            <select id="sound-mode" onchange="sync()" style="background:transparent; color:var(--accent); border:none; outline:none; font-weight:bold;">
                <option value="all">Voice+Beep</option>
                <option value="beep">Beep Only</option>
                <option value="mute">Mute</option>
            </select>
        </div>
        <div class="tool-item">
            View: <span>Split</span>
            <label class="switch">
                <input type="checkbox" id="view-toggle" onchange="sync()">
                <span class="slider"></span>
            </label>
            <span>Shared</span>
        </div>
        <div class="tool-item">
            Downtime: <input type="number" id="downtime-val" value="2.0" step="0.5" min="0" onchange="sync()" style="width:40px; background:rgba(0,0,0,0.3); color:white; border:1px solid var(--border); border-radius:4px; text-align:center;">s
        </div>
        <button class="btn" style="background: #10b981; color: white; font-size: 0.75rem; padding: 6px 12px;" onclick="toggleAreaSettings()">⚙️ AREA SETTINGS</button>
        <button class="btn" style="background: var(--warning); color: #000; font-size: 0.75rem; padding: 6px 12px;" onclick="calibrateBackground()">CALIBRATE</button>
        <button class="btn btn-reset" onclick="fullReset()">RESET</button>
    </div>
</header>

<div class="container">
    <div class="sidebar">
        <div id="camera-wrapper">
            <canvas id="canvas"></canvas>
            <button class="camera-switch-btn" onclick="switchCamera(event)" title="Switch Camera">🔄</button>
        </div>
        
        <div id="area-settings">
            <div class="area-control">X Pos (%): <input type="range" id="roi-x" min="0" max="100" value="25" oninput="syncArea()"></div>
            <div class="area-control">Y Pos (%): <input type="range" id="roi-y" min="0" max="100" value="25" oninput="syncArea()"></div>
            <div class="area-control">Width (%): <input type="range" id="roi-w" min="10" max="100" value="50" oninput="syncArea()"></div>
            <div class="area-control">Height (%): <input type="range" id="roi-h" min="10" max="100" value="50" oninput="syncArea()"></div>
        </div>

        <div class="card">
            <div id="timer-display">00:00.0</div>
            <button class="btn btn-main" id="t-ctrl" onclick="toggleTimer()">START TIMER</button>
        </div>
    </div>

    <div class="main-display card">
        <div id="detect-msg">SYSTEM READY</div>
        <div id="view-container">
            <div id="multi-view"></div>
            <div id="shared-view"><div class="unified-meter" id="unified-meter"></div></div>
        </div>
    </div>

    <div class="card ranking-card">
        <div class="ranking-tabs">
            <span id="tab-ranking" class="tab-btn active" onclick="toggleLogView('ranking')">GOAL RANKING</span>
            <span style="color:#475569;">|</span>
            <span id="tab-log" class="tab-btn" onclick="toggleLogView('log')">LAP LOG</span>
            
            <button class="export-btn" onclick="exportCSV()" title="Export CSV">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
        </div>
        <div id="ranking-list"></div>
        <div id="log-list"></div>
    </div>

    <div class="settings-grid" id="set-container"></div>
</div>

<script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d", { willReadFrequently: true });
    const video = document.createElement("video");
    const timerDisplay = document.getElementById("timer-display");
    const detectMsg = document.getElementById("detect-msg");
    const tCtrl = document.getElementById("t-ctrl");
    const multiView = document.getElementById("multi-view");
    const sharedView = document.getElementById("shared-view");
    const unifiedMeter = document.getElementById("unified-meter");
    const viewToggle = document.getElementById("view-toggle");
    const downtimeInput = document.getElementById("downtime-val");
    const rankingList = document.getElementById("ranking-list");
    const logList = document.getElementById("log-list");
    const modeSelect = document.getElementById("mode-select");
    const timeLimitWrapper = document.getElementById("time-limit-wrapper");
    const soundModeSelect = document.getElementById("sound-mode");

    let timerId = null, startTime = 0, elapsed = 0;
    let cdInterval = null; 
    let isRacing = false; 
    let audioCtx = null;
    let ranking = [];
    let lapHistory = []; 

    let calibBaselines = { yellow: 0, red: 0, blue: 0, pink: 0, purple: 0, black: 0 };
    let isRequestingCalibration = false;
    let pickingColorId = null;
    let currentFacingMode = "user";
    let wakeLock = null;
    let arucoDetector = null;

    let roi = { x: 25, y: 25, w: 50, h: 50 };

    const configs = [
        { id:'yellow', name:'YELLOW', hex:'#facc15', active:true,  detectMode:'color', thresh:100, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, hueCenter: 57, hueTol: 20, arucoId: 0 },
        { id:'red',    name:'RED',    hex:'#ef4444', active:true,  detectMode:'color', thresh:100, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, hueCenter: 0, hueTol: 15, arucoId: 1 },
        { id:'blue',   name:'BLUE',   hex:'#3b82f6', active:true,  detectMode:'color', thresh:100, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, hueCenter: 222, hueTol: 30, arucoId: 2 },
        { id:'pink',   name:'PINK',   hex:'#ec4899', active:false, detectMode:'color', thresh:100, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, hueCenter: 325, hueTol: 25, arucoId: 3 },
        { id:'purple', name:'PURPLE', hex:'#a855f7', active:false, detectMode:'color', thresh:100, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, hueCenter: 280, hueTol: 20, arucoId: 4 },
        { id:'black',  name:'BLACK',  hex:'#475569', active:false, detectMode:'color', thresh:300, target:5, current:0, isHeld: false, lastActionTime: 0, finished: false, special: 'black', arucoId: 5 }
    ];

    async function requestWakeLock() {
        try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } 
        catch (err) { console.error(`Wake Lock Error: ${err.message}`); }
    }

    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') await requestWakeLock();
    });

    async function initCamera() {
        if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: currentFacingMode, width: { ideal: 640 }, height: { ideal: 480 } } });
            video.srcObject = stream;
            await video.play();
            canvas.style.transform = currentFacingMode === "user" ? "scaleX(-1)" : "scaleX(1)";
        } catch (e) { alert("Camera access error: " + e); }
    }

    async function switchCamera(e) {
        e.stopPropagation(); 
        currentFacingMode = currentFacingMode === "user" ? "environment" : "user";
        await initCamera();
    }

    function calibrateBackground() {
        isRequestingCalibration = true;
        detectMsg.innerText = "CALIBRATING...";
    }

    function toggleAreaSettings() {
        const panel = document.getElementById('area-settings');
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    }

    function syncArea() {
        roi.x = parseInt(document.getElementById('roi-x').value);
        roi.y = parseInt(document.getElementById('roi-y').value);
        roi.w = parseInt(document.getElementById('roi-w').value);
        roi.h = parseInt(document.getElementById('roi-h').value);
        if (roi.x + roi.w > 100) { roi.w = 100 - roi.x; document.getElementById('roi-w').value = roi.w; }
        if (roi.y + roi.h > 100) { roi.h = 100 - roi.y; document.getElementById('roi-h').value = roi.h; }
        localStorage.setItem('cc_roi_v2', JSON.stringify(roi));
    }

    function togglePick(id) {
        if (pickingColorId === id) {
            pickingColorId = null;
            document.getElementById(`pick-btn-${id}`).style.background = "#475569";
            detectMsg.innerText = isRacing ? "GO!!" : "SYSTEM READY";
            return;
        }
        if (pickingColorId) document.getElementById(`pick-btn-${pickingColorId}`).style.background = "#475569";
        pickingColorId = id;
        const btn = document.getElementById(`pick-btn-${id}`);
        btn.style.background = "var(--warning)";
        detectMsg.innerText = "TAP CAMERA TO PICK COLOR";
    }

    function toggleLogView(view) {
        if (view === 'ranking') {
            document.getElementById('tab-ranking').classList.add('active');
            document.getElementById('tab-log').classList.remove('active');
            rankingList.style.display = 'flex'; logList.style.display = 'none';
        } else {
            document.getElementById('tab-log').classList.add('active');
            document.getElementById('tab-ranking').classList.remove('active');
            rankingList.style.display = 'none'; logList.style.display = 'flex';
        }
    }

    function exportCSV() {
        let csv = "Category,Name,Lap,Time\n";
        ranking.forEach((r, i) => csv += `Ranking #${i+1},${r.name},-,${r.time}\n`);
        lapHistory.forEach(l => csv += `LapLog,${l.name},${l.lap},${l.time}\n`);
        const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = `LapData_${new Date().toISOString().slice(0,10).replace(/-/g,"")}.csv`;
        a.click();
    }

    function rgbToHsl(r, g, b) {
        r /= 255; g /= 255; b /= 255;
        const max = Math.max(r, g, b), min = Math.min(r, g, b);
        let h, s, l = (max + min) / 2;
        if (max === min) { h = s = 0; } 
        else {
            const d = max - min;
            s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
            switch (max) {
                case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                case g: h = (b - r) / d + 2; break;
                case b: h = (r - g) / d + 4; break;
            }
            h /= 6;
        }
        return [h * 360, s * 100, l * 100];
    }

    function playFeedback(type, config) {
        const smode = soundModeSelect.value;
        if (smode === 'mute') return;

        if (smode === 'all' || smode === 'beep') {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            
            if (type === 'lap' || type === 'start') {
                osc.frequency.setValueAtTime(type === 'start' ? 1760 : 880, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + (type === 'start' ? 0.3 : 0.1));
                osc.start(); osc.stop(audioCtx.currentTime + (type === 'start' ? 0.3 : 0.1));
            } else if (type === 'goal') {
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination);
                    o.type = 'square'; o.frequency.setValueAtTime(f, audioCtx.currentTime + i * 0.1);
                    g.gain.setValueAtTime(0.05, audioCtx.currentTime + i * 0.1);
                    g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + i * 0.1 + 0.4);
                    o.start(audioCtx.currentTime + i * 0.1); o.stop(audioCtx.currentTime + i * 0.1 + 0.4);
                });
            }
        }

        if (smode === 'all' && config) {
            window.speechSynthesis.cancel();
            let text = type === 'goal' ? `${config.name} finished!` : type === 'lap' ? `${config.name} lap ${config.current}` : "Time up! Finished.";
            if (text) {
                const u = new SpeechSynthesisUtterance(text);
                u.lang = "en-US"; u.rate = 1.1; u.pitch = 1.0;
                window.speechSynthesis.speak(u);
            }
        }
    }

    function toggleMode() {
        const isTime = modeSelect.value === 'time';
        timeLimitWrapper.style.display = isTime ? 'inline-block' : 'none';
        fullReset();
    }

    function updateTimerInitialDisplay() {
        if (modeSelect.value === 'time') {
            const limit = parseFloat(document.getElementById('time-limit-val').value) || 0;
            const m = Math.floor(limit / 60).toString().padStart(2,'0');
            const s = Math.floor(limit % 60).toString().padStart(2,'0');
            timerDisplay.innerText = `${m}:${s}.0`;
        } else timerDisplay.innerText = "00:00.0";
    }

    function manualCount(id, delta) {
        const c = configs.find(x => x.id === id);
        if (!c || !c.active) return;
        const mode = modeSelect.value;

        if (delta > 0) {
            if (c.finished && mode === 'normal') return; 
            c.current++;
            const logTime = timerDisplay.innerText;
            lapHistory.unshift({ name: c.name, color: c.hex, lap: c.current, time: logTime });
            updateLogUI();

            const isGoal = (mode === 'normal') ? c.current >= c.target : false;
            if (isGoal) {
                c.finished = true; ranking.push({ name: c.name, color: c.hex, time: logTime });
                playFeedback('goal', c); detectMsg.innerText = c.name + " FINISHED!! (MANUAL)";
            } else {
                playFeedback('lap', c); detectMsg.innerText = c.name + " LAP " + c.current + " (MANUAL)";
            }
        } else {
            if (c.current > 0) {
                c.current--; c.finished = false; 
                const logIdx = lapHistory.findIndex(log => log.name === c.name);
                if (logIdx !== -1) lapHistory.splice(logIdx, 1);
                updateLogUI();
                const rankIdx = ranking.findIndex(r => r.name === c.name);
                if (rankIdx !== -1) ranking.splice(rankIdx, 1);
                detectMsg.innerText = c.name + " -1 (UNDO)";
            }
        }
        sync();
    }

    function init() {
        const saved = JSON.parse(localStorage.getItem('cc_eng_v4') || '[]');
        const savedRoi = JSON.parse(localStorage.getItem('cc_roi_v2'));
        if (savedRoi) {
            roi = savedRoi;
            document.getElementById('roi-x').value = roi.x; document.getElementById('roi-y').value = roi.y;
            document.getElementById('roi-w').value = roi.w; document.getElementById('roi-h').value = roi.h;
        }

        const setContainer = document.getElementById('set-container');
        configs.forEach((c, i) => {
            if (saved[i]) {
                c.active = saved[i].active !== undefined ? saved[i].active : c.active;
                c.detectMode = saved[i].detectMode || c.detectMode;
                c.name = saved[i].name || c.name;
                c.target = saved[i].target || c.target;
                c.thresh = saved[i].thresh || c.thresh;
                c.hueCenter = saved[i].hueCenter !== undefined ? saved[i].hueCenter : c.hueCenter;
                c.hueTol = saved[i].hueTol !== undefined ? saved[i].hueTol : c.hueTol;
                c.arucoId = saved[i].arucoId !== undefined ? saved[i].arucoId : c.arucoId;
            }
            
            const lane = document.createElement('div');
            lane.className = `lane`; lane.id = `lane-${c.id}`;
            lane.innerHTML = `
                <div class="lane-label" id="label-${c.id}">
                    <span style="color:${c.hex};">${c.name}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <button class="manual-btn" onclick="manualCount('${c.id}', -1)">-</button>
                        <span id="num-${c.id}" style="width:40px; text-align:center;">${c.current}/${c.target}</span>
                        <button class="manual-btn" onclick="manualCount('${c.id}', 1)">+</button>
                    </div>
                </div>
                <div class="bar-bg"><div class="bar-fill" id="bar-${c.id}" style="background:${c.hex}; color:${c.hex}"></div></div>`;
            multiView.appendChild(lane);
            
            const hueControl = c.special === 'black' ? '' : `
                <div class="input-group">
                    <span style="display:flex; align-items:center;">Hue(<span id="hval-${c.id}" style="display:inline-block; width:22px;">${c.hueCenter}</span>°):
                        <button class="btn" style="background:#475569; color:white; font-size:0.6rem; padding:2px 6px; margin-left:4px;" onclick="togglePick('${c.id}')" id="pick-btn-${c.id}">PICK</button>
                    </span>
                </div>
                <input type="range" id="h-${c.id}" min="0" max="360" step="1" value="${c.hueCenter}" oninput="sync()">
                <div class="input-group">Tolerance: <input type="range" id="htol-${c.id}" min="5" max="90" step="1" value="${c.hueTol}" style="width:60px;" oninput="sync()"></div>
            `;

            const sc = document.createElement('div');
            sc.className = `set-item`; sc.id = `sc-${c.id}`; sc.style.borderTopColor = c.hex;
            sc.innerHTML = `
                <div class="input-group">
                    <b style="color:${c.hex}">${c.id.toUpperCase()}</b>
                    <input type="checkbox" id="on-${c.id}" ${c.active?'checked':''} onchange="sync()" style="transform:scale(1.2);">
                </div>
                <div class="input-group">Name:<input type="text" id="n-${c.id}" value="${c.name}" oninput="sync()"></div>
                <div class="input-group">Target:<input type="number" id="t-${c.id}" value="${c.target}" oninput="sync()"></div>
                <div class="input-group">Mode:
                    <select id="dm-${c.id}" onchange="sync()">
                        <option value="color" ${c.detectMode === 'color' ? 'selected' : ''}>Color</option>
                        <option value="aruco" ${c.detectMode === 'aruco' ? 'selected' : ''}>ArUco</option>
                    </select>
                </div>
                
                <div id="wrap-aruco-${c.id}">
                    <div class="input-group">ArUco ID:<input type="number" id="aruco-${c.id}" value="${c.arucoId}" oninput="sync()"></div>
                </div>

                <div id="wrap-color-${c.id}">
                    <div class="input-group">Sens(px):<input type="range" id="r-${c.id}" min="10" max="2000" step="10" value="${c.thresh}" style="width:60px;" oninput="sync()"></div>
                    ${hueControl}
                </div>

                <div class="activity-bg"><div class="activity-fill" id="act-${c.id}"></div></div>
            `;
            setContainer.appendChild(sc);
        });

        const globalSaved = JSON.parse(localStorage.getItem('cc_global_settings_v4'));
        if (globalSaved) {
            modeSelect.value = globalSaved.mode || 'normal';
            document.getElementById('time-limit-val').value = globalSaved.timeLimit || 60;
            downtimeInput.value = globalSaved.downtime || 2.0;
            viewToggle.checked = globalSaved.isShared || false;
            soundModeSelect.value = globalSaved.soundMode || 'all';
            timeLimitWrapper.style.display = modeSelect.value === 'time' ? 'inline-block' : 'none';
        }

        sync();
        updateTimerInitialDisplay(); 
    }

    function sync() {
        const isShared = viewToggle.checked;
        const mode = modeSelect.value;
        multiView.style.display = isShared ? "none" : "flex";
        sharedView.style.display = isShared ? "flex" : "none";
        
        let totalTarget = 0, totalCurrent = 0;
        const maxCurr = Math.max(1, ...configs.map(x => x.current));
        
        unifiedMeter.innerHTML = "";
        configs.forEach(c => {
            c.active = document.getElementById(`on-${c.id}`).checked;
            c.name = document.getElementById(`n-${c.id}`).value;
            c.target = parseInt(document.getElementById(`t-${c.id}`).value) || 1;
            c.detectMode = document.getElementById(`dm-${c.id}`).value;
            c.arucoId = parseInt(document.getElementById(`aruco-${c.id}`).value);
            c.thresh = parseInt(document.getElementById(`r-${c.id}`).value);
            
            if (c.special !== 'black') {
                c.hueCenter = parseInt(document.getElementById(`h-${c.id}`).value);
                c.hueTol = parseInt(document.getElementById(`htol-${c.id}`).value);
                document.getElementById(`hval-${c.id}`).innerText = c.hueCenter;
            }

            // Toggles UI blocks per lane based on mode
            document.getElementById(`wrap-aruco-${c.id}`).style.display = c.detectMode === 'aruco' ? 'block' : 'none';
            document.getElementById(`wrap-color-${c.id}`).style.display = c.detectMode === 'color' ? 'block' : 'none';

            document.getElementById(`lane-${c.id}`).className = `lane ${c.active ? 'active' : ''}`;
            document.getElementById(`sc-${c.id}`).className = `set-item ${c.active ? '' : 'disabled'}`;
            document.getElementById(`num-${c.id}`).innerText = mode === 'time' ? `${c.current}` : `${c.current} / ${c.target}`;
            
            const bar = document.getElementById(`bar-${c.id}`);
            if (mode === 'time') {
                bar.style.width = Math.min(100, (c.current / maxCurr) * 100) + "%";
                bar.classList.toggle('goal-flash', false); 
            } else {
                bar.style.width = Math.min(100, (c.current / c.target) * 100) + "%";
                bar.classList.toggle('goal-flash', c.current >= c.target);
            }

            if(c.active) {
                totalTarget += c.target; totalCurrent += c.current;
                if(isShared && c.current > 0) {
                    const seg = document.createElement('div');
                    seg.className = "meter-segment"; seg.style.flex = c.current; seg.style.background = c.hex; seg.innerText = c.name.charAt(0);
                    unifiedMeter.appendChild(seg);
                }
            }
        });
        
        unifiedMeter.classList.toggle('goal-flash', mode === 'normal' && totalCurrent >= totalTarget && totalTarget > 0);
        updateRankingUI();

        localStorage.setItem('cc_eng_v4', JSON.stringify(configs));
        localStorage.setItem('cc_global_settings_v4', JSON.stringify({
            mode: modeSelect.value, timeLimit: document.getElementById('time-limit-val').value,
            downtime: downtimeInput.value, isShared: viewToggle.checked, soundMode: soundModeSelect.value
        }));
    }

    function updateRankingUI() {
        rankingList.innerHTML = "";
        ranking.forEach((e, i) => {
            const item = document.createElement("div"); item.className = "rank-item";
            item.innerHTML = `<span class="rank-num">#${i+1}</span> <span style="color:${e.color}; font-weight:bold;">${e.name}</span> <small style="margin-left:auto; color:var(--text-muted);">${e.time ? e.time : `${e.count} Laps`}</small>`;
            rankingList.appendChild(item);
        });
    }

    function updateLogUI() {
        logList.innerHTML = "";
        lapHistory.forEach((log) => {
            const item = document.createElement("div"); item.className = "log-item"; item.style.borderLeftColor = log.color;
            item.innerHTML = `<span style="color:${log.color}; font-weight:bold;">${log.name} <span style="color:var(--text-muted); font-size:0.7rem;">(Lap ${log.lap})</span></span> <span style="color:var(--accent);">${log.time}</span>`;
            logList.appendChild(item);
        });
    }

    function toggleTimer() {
        if (cdInterval) return;
        if (timerId || isRacing) {
            clearInterval(timerId); timerId = null; isRacing = false; tCtrl.innerText = "RESUME TIMER";
        } else {
            tCtrl.disabled = true; tCtrl.innerText = "STARTING...";
            let count = 5; timerDisplay.innerText = `- 0${count} -`; detectMsg.innerText = "GET READY...";
            playFeedback('lap');
            cdInterval = setInterval(() => {
                count--;
                if (count > 0) { timerDisplay.innerText = `- 0${count} -`; playFeedback('lap'); } 
                else {
                    clearInterval(cdInterval); cdInterval = null; isRacing = true; tCtrl.disabled = false;
                    tCtrl.innerText = "STOP TIMER"; detectMsg.innerText = "GO!!"; playFeedback('start');
                    startTime = Date.now() - elapsed;
                    timerId = setInterval(() => {
                        elapsed = Date.now() - startTime;
                        let displayTime = elapsed;
                        const isTimeMode = (modeSelect.value === 'time');
                        if (isTimeMode) {
                            displayTime = (parseFloat(document.getElementById('time-limit-val').value) * 1000) - elapsed;
                            if (displayTime <= 0) displayTime = 0;
                        }
                        const m = Math.floor(displayTime / 60000).toString().padStart(2,'0');
                        const s = Math.floor((displayTime % 60000) / 1000).toString().padStart(2,'0');
                        const ms = Math.floor((displayTime % 1000) / 100);
                        timerDisplay.innerText = `${m}:${s}.${ms}`;
                        if (isTimeMode && displayTime <= 0) finishTimeAttack();
                    }, 100);
                }
            }, 1000);
        }
    }

    function finishTimeAttack() {
        clearInterval(timerId); timerId = null; isRacing = false; tCtrl.innerText = "TIME UP"; detectMsg.innerText = "FINISH!!";
        playFeedback('goal'); playFeedback('timeup', { name: "Time up" }); 
        ranking = configs.filter(c => c.active && c.current > 0).map(c => ({ name: c.name, color: c.hex, count: c.current })).sort((a, b) => b.count - a.count);
        updateRankingUI();
    }

    function fullReset() {
        if(!confirm("Reset all race data?")) return;
        if (cdInterval) { clearInterval(cdInterval); cdInterval = null; }
        configs.forEach(c => { c.current = 0; c.isHeld = false; c.lastActionTime = 0; c.finished = false; });
        ranking = []; lapHistory = []; elapsed = 0; isRacing = false; pickingColorId = null; 
        updateTimerInitialDisplay(); 
        if(timerId) { clearInterval(timerId); timerId = null; }
        tCtrl.innerText = "START TIMER"; tCtrl.disabled = false; sync(); updateLogUI();
        detectMsg.innerText = "SYSTEM RESET COMPLETE"; toggleLogView('ranking');
    }

    async function begin() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById("start-overlay").style.display = "none";
        if (typeof AR !== 'undefined') arucoDetector = new AR.Detector();
        else console.warn("js-aruco library could not be loaded.");
        await requestWakeLock(); await initCamera(); loop(); 
    }

    function loop() {
        if (video.readyState === video.HAVE_ENOUGH_DATA) {
            canvas.width = 320; canvas.height = 240;
            ctx.drawImage(video, 0, 0, 320, 240);

            // 1. ArUco Detection & Drawing
            let detectedArucoIds = [];
            if (arucoDetector) {
                try {
                    const fullImageData = ctx.getImageData(0, 0, 320, 240);
                    const markers = arucoDetector.detect(fullImageData);
                    
                    markers.forEach(marker => {
                        // アクティブかつArUcoモードで設定されているIDかチェック
                        const matchedConfig = configs.find(c => c.active && c.detectMode === 'aruco' && c.arucoId === marker.id);
                        if (matchedConfig) {
                            detectedArucoIds.push(marker.id);
                            
                            // 枠線の描画
                            ctx.lineWidth = 3;
                            ctx.strokeStyle = matchedConfig.hex;
                            ctx.beginPath();
                            ctx.moveTo(marker.corners[0].x, marker.corners[0].y);
                            ctx.lineTo(marker.corners[1].x, marker.corners[1].y);
                            ctx.lineTo(marker.corners[2].x, marker.corners[2].y);
                            ctx.lineTo(marker.corners[3].x, marker.corners[3].y);
                            ctx.closePath();
                            ctx.stroke();

                            // IDの描画
                            ctx.fillStyle = matchedConfig.hex;
                            ctx.font = 'bold 16px sans-serif';
                            ctx.fillText('ID: ' + marker.id, marker.corners[0].x, marker.corners[0].y - 5);
                        }
                    });
                } catch(e) {}
            }

            // 2. ROI (Color Detection Area)
            const rx = Math.floor(320 * (roi.x / 100)); const ry = Math.floor(240 * (roi.y / 100));
            const rw = Math.floor(320 * (roi.w / 100)); const rh = Math.floor(240 * (roi.h / 100));
            
            ctx.strokeStyle = 'rgba(34, 197, 94, 0.8)';
            ctx.lineWidth = 2; ctx.setLineDash([5, 5]);
            ctx.strokeRect(rx, ry, rw, rh);
            ctx.setLineDash([]);

            let pc = { yellow:0, red:0, blue:0, pink:0, purple:0, black:0 };
            
            if (rw > 0 && rh > 0) {
                const data = ctx.getImageData(rx, ry, rw, rh).data;
                for (let i = 0; i < data.length; i += 4) {
                    const r = data[i], g = data[i+1], b = data[i+2];
                    const [h, s, l] = rgbToHsl(r, g, b);

                    if (l < 25) {
                        pc.black++;
                    } else if (s > 20 && l > 15) { 
                        for (let j = 0; j < configs.length; j++) {
                            const c = configs[j];
                            if (c.special === 'black' || !c.active || c.detectMode === 'aruco') continue; 
                            
                            let diff = Math.abs(h - c.hueCenter);
                            if (diff > 180) diff = 360 - diff;
                            if (diff <= c.hueTol) { pc[c.id]++; break; }
                        }
                    }
                }
            }

            if (isRequestingCalibration) {
                configs.forEach(c => calibBaselines[c.id] = pc[c.id]);
                isRequestingCalibration = false; detectMsg.innerText = "CALIBRATION DONE";
                setTimeout(() => { if(!isRacing && !pickingColorId) detectMsg.innerText = "SYSTEM READY"; }, 1000);
            }

            configs.forEach(c => pc[c.id] = Math.max(0, pc[c.id] - calibBaselines[c.id]));

            const now = Date.now(), dt = parseFloat(downtimeInput.value) * 1000;
            const mode = modeSelect.value;
            
            configs.forEach(c => {
                if (!c.active) { document.getElementById(`act-${c.id}`).style.width = "0%"; return; }

                // UI Activity Update (Color Mode Only)
                const actFill = document.getElementById(`act-${c.id}`);
                if (c.detectMode === 'color') {
                    const actPercent = Math.min(100, (pc[c.id] / c.thresh) * 100);
                    actFill.style.width = actPercent + "%";
                    actFill.style.backgroundColor = actPercent >= 100 ? "white" : c.hex;
                } else {
                    const isArucoActive = detectedArucoIds.includes(c.arucoId);
                    actFill.style.width = isArucoActive ? "100%" : "0%";
                    actFill.style.backgroundColor = "white";
                }

                if (c.finished) return;

                const isSeenColor = c.detectMode === 'color' && pc[c.id] >= c.thresh;
                const isSeenAruco = c.detectMode === 'aruco' && detectedArucoIds.includes(c.arucoId);
                const isSeen = isSeenColor || isSeenAruco;

                const lbl = document.getElementById(`label-${c.id}`);
                
                if (isSeen) {
                    if (isRacing && !c.isHeld && (now - c.lastActionTime > dt)) { 
                        c.isHeld = true; lbl.classList.add('holding'); 
                        detectMsg.innerText = "DETECTING " + c.name + "..."; 
                    }
                } else if (c.isHeld) {
                    c.isHeld = false; 
                    if (isRacing) {
                        c.current++; c.lastActionTime = now; lbl.classList.remove('holding');
                        const logTime = timerDisplay.innerText;
                        lapHistory.unshift({ name: c.name, color: c.hex, lap: c.current, time: logTime });
                        updateLogUI();
                        const isGoal = (mode === 'normal') ? c.current >= c.target : false;
                        if (isGoal) {
                            c.finished = true; ranking.push({ name: c.name, color: c.hex, time: timerDisplay.innerText });
                            playFeedback('goal', c); detectMsg.innerText = c.name + " FINISHED!!";
                        } else {
                            playFeedback('lap', c); detectMsg.innerText = c.name + " LAP " + c.current;
                        }
                        sync();
                    }
                }
            });
        }
        requestAnimationFrame(loop);
    }
    
    document.getElementById('camera-wrapper').addEventListener('click', (e) => {
        if (!pickingColorId || e.target.classList.contains('camera-switch-btn')) return;
        const rect = canvas.getBoundingClientRect();
        const normX = (e.clientX - rect.left) / rect.width; const normY = (e.clientY - rect.top) / rect.height;
        const internalX = currentFacingMode === "user" ? Math.floor((1.0 - normX) * canvas.width) : Math.floor(normX * canvas.width);        
        const internalY = Math.floor(normY * canvas.height);
        if (internalX < 0 || internalX >= canvas.width || internalY < 0 || internalY >= canvas.height) return;

        const pixelData = ctx.getImageData(internalX, internalY, 1, 1).data;
        const [h, s, l] = rgbToHsl(pixelData[0], pixelData[1], pixelData[2]);

        const c = configs.find(cfg => cfg.id === pickingColorId);
        if (c) {
            c.hueCenter = Math.floor(h);
            document.getElementById(`h-${c.id}`).value = c.hueCenter; document.getElementById(`hval-${c.id}`).innerText = c.hueCenter;
            sync(); 
        }

        document.getElementById(`pick-btn-${pickingColorId}`).style.background = "#475569";
        pickingColorId = null; detectMsg.innerText = "COLOR PICKED!";
        setTimeout(() => { if (!pickingColorId) detectMsg.innerText = isRacing ? "GO!!" : "SYSTEM READY"; }, 1500);
    });

    init();
</script>
